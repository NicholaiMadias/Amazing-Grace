<!DOCTYPE html>
<html>
<head>
  <title>GulfNexus SSL Status</title>
  <style>
    body { background:#0a0a0f; color:white; font-family:system-ui; padding:2rem; }
    h1 { color:#7ec8e3; text-align:center; }
    .domain { margin:1rem 0; padding:1rem; background:#111; border-radius:8px; }
  </style>
</head>
<body>

<h1>GulfNexus SSL Certificate Status</h1>

<div id="results"></div>

<script>
const domains = [
  "amazinggracehomeliving.com",
  "gamifiedlearning.org",
  "limitlessnexus.com"
];

async function checkSSL(domain) {
  try {
    const res = await fetch(`https://${domain}`, { method: "HEAD" });
    return res.ok ? "Active" : "Error";
  } catch {
    return "Unreachable";
  }
}

(async () => {
  const container = document.getElementById("results");

  for (const domain of domains) {
    const status = await checkSSL(domain);
    const div = document.createElement("div");
    div.className = "domain";
    div.innerHTML = `<strong>${domain}</strong>: ${status}`;
    container.appendChild(div);
  }
})();
</script>

</body>
</html>

