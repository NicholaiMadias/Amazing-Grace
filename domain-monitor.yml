name: Domain Health Monitor

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check amazinggracehl.org
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 https://amazinggracehl.org)
          echo "amazinggracehl.org → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::amazinggracehl.org returned HTTP $STATUS (expected 200)"
            exit 1
          fi

      - name: Check DNS resolution
        run: |
          echo "--- A records ---"
          dig +short amazinggracehl.org A
          echo "--- www CNAME ---"
          dig +short www.amazinggracehl.org CNAME
