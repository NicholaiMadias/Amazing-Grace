<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0118"/>
      <stop offset="50%" stop-color="#200935"/>
      <stop offset="100%" stop-color="#3d1a50"/>
    </linearGradient>
    <linearGradient id="house3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4e2462"/>
      <stop offset="100%" stop-color="#301240"/>
    </linearGradient>
    <linearGradient id="roof3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#c9a800"/>
    </linearGradient>
    <linearGradient id="ground3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e0830"/>
      <stop offset="100%" stop-color="#110520"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="450" fill="url(#sky3)"/>

  <!-- Stars scattered -->
  <circle cx="40" cy="50" r="1.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="110" cy="30" r="1" fill="white" opacity="0.6"/>
  <circle cx="190" cy="65" r="1.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="265" cy="35" r="1" fill="white" opacity="0.6"/>
  <circle cx="340" cy="52" r="1.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="415" cy="22" r="1" fill="white" opacity="0.5"/>
  <circle cx="490" cy="55" r="1.5" fill="#ffd700" opacity="0.6"/>
  <circle cx="565" cy="38" r="1" fill="white" opacity="0.7"/>
  <circle cx="645" cy="62" r="1.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="720" cy="28" r="1" fill="white" opacity="0.6"/>
  <circle cx="775" cy="48" r="1.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="75" cy="82" r="1" fill="#ffd700" opacity="0.3"/>
  <circle cx="320" cy="78" r="1" fill="white" opacity="0.35"/>
  <circle cx="600" cy="80" r="1" fill="#ffd700" opacity="0.3"/>

  <!-- Warm gold glow (dusk/sunset feel) -->
  <radialGradient id="sunGlow3" cx="0.2" cy="0.6" r="0.5">
    <stop offset="0%" stop-color="rgba(255,200,50,0.18)"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="800" height="450" fill="url(#sunGlow3)"/>

  <!-- Ground -->
  <rect x="0" y="330" width="800" height="120" fill="url(#ground3)"/>

  <!-- Florida-style palm tree left -->
  <line x1="120" y1="340" x2="150" y2="215" stroke="#1a0829" stroke-width="10" stroke-linecap="round"/>
  <line x1="150" y1="215" x2="155" y2="200" stroke="#1a0829" stroke-width="8" stroke-linecap="round"/>
  <!-- Palm fronds -->
  <path d="M155 200 Q110 160 75 175" stroke="#2a1040" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M155 200 Q120 155 115 130" stroke="#2a1040" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M155 200 Q155 145 165 125" stroke="#2a1040" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M155 200 Q185 150 210 145" stroke="#2a1040" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M155 200 Q195 165 215 180" stroke="#2a1040" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Coconuts -->
  <circle cx="148" cy="205" r="6" fill="#3a1a50"/>

  <!-- Palm tree right -->
  <line x1="660" y1="340" x2="640" y2="220" stroke="#1a0829" stroke-width="9" stroke-linecap="round"/>
  <path d="M640 220 Q590 175 555 188" stroke="#2a1040" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M640 220 Q605 165 610 142" stroke="#2a1040" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M640 220 Q650 165 660 145" stroke="#2a1040" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M640 220 Q675 168 695 172" stroke="#2a1040" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="637" cy="225" r="6" fill="#3a1a50"/>

  <!-- House body (wider, ranch-style) -->
  <rect x="200" y="240" width="400" height="130" fill="url(#house3)" rx="4"/>

  <!-- Chimney -->
  <rect x="440" y="168" width="25" height="72" fill="#3d1a50"/>
  <rect x="434" y="163" width="37" height="10" fill="#ffd700"/>

  <!-- Roof (lower pitch, ranch-style) -->
  <polygon points="175,240 400,125 625,240" fill="url(#roof3)"/>
  <line x1="400" y1="125" x2="400" y2="240" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  <line x1="222" y1="200" x2="579" y2="200" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>
  <line x1="236" y1="220" x2="566" y2="220" stroke="rgba(0,0,0,0.1)" stroke-width="1.5"/>

  <!-- Porch columns -->
  <rect x="285" y="320" width="230" height="10" fill="#ffd700" opacity="0.4" rx="2"/>
  <rect x="295" y="300" width="7" height="40" fill="#ffd700" opacity="0.35"/>
  <rect x="500" y="300" width="7" height="40" fill="#ffd700" opacity="0.35"/>

  <!-- Front door -->
  <rect x="368" y="305" width="64" height="65" fill="#120618" rx="3"/>
  <circle cx="393" cy="337" r="4" fill="#ffd700"/>
  <rect x="374" y="312" width="20" height="17" fill="rgba(255,215,0,0.07)" rx="2"/>
  <rect x="400" y="312" width="20" height="17" fill="rgba(255,215,0,0.07)" rx="2"/>

  <!-- Left window group (two windows) -->
  <rect x="222" y="265" width="65" height="52" fill="#0d0520" rx="3"/>
  <line x1="254" y1="265" x2="254" y2="317" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
  <line x1="222" y1="291" x2="287" y2="291" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
  <rect x="222" y="265" width="65" height="52" fill="rgba(255,215,0,0.05)" rx="3"/>

  <rect x="300" y="265" width="55" height="52" fill="#0d0520" rx="3"/>
  <line x1="327" y1="265" x2="327" y2="317" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
  <line x1="300" y1="291" x2="355" y2="291" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
  <rect x="300" y="265" width="55" height="52" fill="rgba(255,215,0,0.05)" rx="3"/>

  <!-- Right window group -->
  <rect x="445" y="265" width="55" height="52" fill="#0d0520" rx="3"/>
  <line x1="472" y1="265" x2="472" y2="317" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
  <line x1="445" y1="291" x2="500" y2="291" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
  <rect x="445" y="265" width="55" height="52" fill="rgba(255,215,0,0.05)" rx="3"/>

  <rect x="513" y="265" width="65" height="52" fill="#0d0520" rx="3"/>
  <line x1="545" y1="265" x2="545" y2="317" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
  <line x1="513" y1="291" x2="578" y2="291" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
  <rect x="513" y="265" width="65" height="52" fill="rgba(255,215,0,0.05)" rx="3"/>

  <!-- Attic gable window -->
  <circle cx="400" cy="162" r="20" fill="#0d0520"/>
  <line x1="400" y1="142" x2="400" y2="182" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
  <line x1="380" y1="162" x2="420" y2="162" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
  <circle cx="400" cy="162" r="20" fill="rgba(255,215,0,0.07)"/>

  <!-- Purple glow under house -->
  <ellipse cx="400" cy="374" rx="195" ry="20" fill="rgba(74,35,90,0.4)"/>

  <!-- Label -->
  <rect x="0" y="392" width="800" height="58" fill="rgba(8,0,18,0.78)"/>
  <text x="400" y="420" font-family="'Arial Black', Arial, sans-serif" font-size="17" font-weight="900" fill="#ffd700" text-anchor="middle" letter-spacing="0.05em">926 E Poinsettia Ave, Largo, FL</text>
  <text x="400" y="441" font-family="Arial, sans-serif" font-size="12" fill="rgba(240,230,255,0.75)" text-anchor="middle" letter-spacing="0.08em">ALL-INCLUSIVE · UTILITIES PAID · QUIET AREA</text>
</svg>
