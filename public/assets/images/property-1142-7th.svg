<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0115"/>
      <stop offset="55%" stop-color="#2a0d38"/>
      <stop offset="100%" stop-color="#3d1a50"/>
    </linearGradient>
    <linearGradient id="house2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#522866"/>
      <stop offset="100%" stop-color="#341545"/>
    </linearGradient>
    <linearGradient id="roof2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c200"/>
      <stop offset="100%" stop-color="#b89a00"/>
    </linearGradient>
    <linearGradient id="ground2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#250e3a"/>
      <stop offset="100%" stop-color="#160722"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="450" fill="url(#sky2)"/>

  <!-- Stars -->
  <circle cx="70" cy="35" r="1.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="150" cy="55" r="1" fill="white" opacity="0.5"/>
  <circle cx="240" cy="25" r="1.5" fill="#ffd700" opacity="0.6"/>
  <circle cx="310" cy="65" r="1" fill="white" opacity="0.4"/>
  <circle cx="390" cy="35" r="1.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="460" cy="55" r="1" fill="white" opacity="0.6"/>
  <circle cx="540" cy="25" r="1.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="625" cy="45" r="1" fill="white" opacity="0.7"/>
  <circle cx="700" cy="30" r="1.5" fill="#ffd700" opacity="0.6"/>
  <circle cx="760" cy="60" r="1" fill="white" opacity="0.4"/>
  <circle cx="110" cy="85" r="1" fill="#ffd700" opacity="0.35"/>
  <circle cx="475" cy="80" r="1" fill="white" opacity="0.35"/>
  <circle cx="650" cy="75" r="1" fill="#ffd700" opacity="0.4"/>

  <!-- Purple nebula glow -->
  <circle cx="130" cy="90" r="60" fill="rgba(107,55,128,0.12)"/>

  <!-- Crescent moon -->
  <circle cx="700" cy="75" r="18" fill="#ffd700" opacity="0.2"/>
  <circle cx="710" cy="70" r="16" fill="#0d0115"/>
  <circle cx="700" cy="75" r="18" fill="rgba(255,215,0,0.15)"/>

  <!-- Ground -->
  <rect x="0" y="335" width="800" height="115" fill="url(#ground2)"/>

  <!-- Shrubs left -->
  <ellipse cx="170" cy="338" rx="55" ry="24" fill="#220a35"/>
  <ellipse cx="140" cy="334" rx="35" ry="20" fill="#341545"/>
  <!-- Shrubs right -->
  <ellipse cx="630" cy="338" rx="55" ry="24" fill="#220a35"/>
  <ellipse cx="660" cy="334" rx="35" ry="20" fill="#341545"/>

  <!-- Pathway / walkway -->
  <path d="M350 450 L375 335 L425 335 L450 450 Z" fill="rgba(255,215,0,0.05)"/>

  <!-- House extension / garage left -->
  <rect x="155" y="278" width="115" height="100" fill="#3a1a50" rx="3"/>
  <!-- Garage door -->
  <rect x="165" y="290" width="95" height="65" fill="#1a0829" rx="3"/>
  <line x1="165" y1="308" x2="260" y2="308" stroke="rgba(255,215,0,0.2)" stroke-width="1.5"/>
  <line x1="165" y1="325" x2="260" y2="325" stroke="rgba(255,215,0,0.2)" stroke-width="1.5"/>
  <line x1="165" y1="342" x2="260" y2="342" stroke="rgba(255,215,0,0.2)" stroke-width="1.5"/>
  <line x1="212" y1="290" x2="212" y2="355" stroke="rgba(255,215,0,0.2)" stroke-width="1.5"/>
  <!-- Garage roof -->
  <polygon points="140,278 212,210 285,278" fill="#c9a800"/>

  <!-- Main house body -->
  <rect x="255" y="230" width="375" height="148" fill="url(#house2)" rx="4"/>

  <!-- Chimney -->
  <rect x="540" y="148" width="28" height="82" fill="#3a1a50"/>
  <rect x="535" y="143" width="38" height="10" fill="#e8c200"/>

  <!-- Main roof -->
  <polygon points="230,230 442,88 655,230" fill="url(#roof2)"/>
  <line x1="442" y1="88" x2="442" y2="230" stroke="rgba(0,0,0,0.18)" stroke-width="2"/>
  <line x1="265" y1="185" x2="620" y2="185" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>
  <line x1="278" y1="208" x2="608" y2="208" stroke="rgba(0,0,0,0.1)" stroke-width="1.5"/>

  <!-- Porch posts -->
  <rect x="310" y="310" width="200" height="12" fill="#e8c200" opacity="0.45" rx="2"/>
  <rect x="319" y="288" width="7" height="55" fill="#e8c200" opacity="0.35"/>
  <rect x="494" y="288" width="7" height="55" fill="#e8c200" opacity="0.35"/>

  <!-- Front door -->
  <rect x="385" y="298" width="72" height="80" fill="#120618" rx="4"/>
  <circle cx="417" cy="337" r="4.5" fill="#ffd700"/>
  <rect x="391" y="305" width="24" height="20" fill="rgba(255,215,0,0.07)" rx="2"/>
  <rect x="421" y="305" width="24" height="20" fill="rgba(255,215,0,0.07)" rx="2"/>
  <path d="M385 298 Q421 280 457 298" fill="none" stroke="rgba(255,215,0,0.28)" stroke-width="2"/>

  <!-- Left window -->
  <rect x="272" y="256" width="80" height="62" fill="#0d0520" rx="4"/>
  <line x1="312" y1="256" x2="312" y2="318" stroke="rgba(255,215,0,0.3)" stroke-width="2"/>
  <line x1="272" y1="287" x2="352" y2="287" stroke="rgba(255,215,0,0.3)" stroke-width="2"/>
  <rect x="272" y="256" width="80" height="62" fill="rgba(255,215,0,0.05)" rx="4"/>

  <!-- Right window -->
  <rect x="490" y="256" width="80" height="62" fill="#0d0520" rx="4"/>
  <line x1="530" y1="256" x2="530" y2="318" stroke="rgba(255,215,0,0.3)" stroke-width="2"/>
  <line x1="490" y1="287" x2="570" y2="287" stroke="rgba(255,215,0,0.3)" stroke-width="2"/>
  <rect x="490" y="256" width="80" height="62" fill="rgba(255,215,0,0.05)" rx="4"/>

  <!-- Attic window -->
  <ellipse cx="442" cy="152" rx="22" ry="20" fill="#0d0520"/>
  <line x1="442" y1="132" x2="442" y2="172" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
  <line x1="420" y1="152" x2="464" y2="152" stroke="rgba(255,215,0,0.3)" stroke-width="1.5"/>
  <ellipse cx="442" cy="152" rx="22" ry="20" fill="rgba(255,215,0,0.07)"/>

  <!-- Glow under house -->
  <ellipse cx="442" cy="382" rx="200" ry="22" fill="rgba(74,35,90,0.45)"/>

  <!-- Label -->
  <rect x="0" y="392" width="800" height="58" fill="rgba(10,0,20,0.78)"/>
  <text x="400" y="421" font-family="'Arial Black', Arial, sans-serif" font-size="17" font-weight="900" fill="#ffd700" text-anchor="middle" letter-spacing="0.05em">1142 7th St NW, Largo, FL</text>
  <text x="400" y="441" font-family="Arial, sans-serif" font-size="12" fill="rgba(240,230,255,0.75)" text-anchor="middle" letter-spacing="0.08em">ALL-INCLUSIVE · CABLE TV · LAUNDRY · PARKING</text>
</svg>
