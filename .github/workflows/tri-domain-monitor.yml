name: Tri-Domain Health Monitor

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    name: Check Domain Health
    runs-on: ubuntu-latest
    outputs:
      ministry_status: ${{ steps.check.outputs.ministry_status }}
      ministry_down:   ${{ steps.check.outputs.ministry_down }}

    steps:
      - name: Check domain health
        id: check
        shell: bash
        run: |
          declare -A DOMAINS
          DOMAINS["nicholai.org"]="standard"
          DOMAINS["amazinggracehomeliving.com"]="standard"
          DOMAINS["voiceofjesusministry.org"]="critical"

          SUMMARY_ROWS=""
          ANY_DOWN=false
          MINISTRY_DOWN=false
          MINISTRY_STATUS="up"

          for DOMAIN in "${!DOMAINS[@]}"; do
            SEVERITY="${DOMAINS[$DOMAIN]}"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 --retry 2 --retry-delay 3 \
              "https://${DOMAIN}" || echo "000")

            if [[ "$HTTP_CODE" =~ ^2 ]]; then
              STATUS="✅ UP"
              BADGE="🟢"
            else
              STATUS="❌ DOWN (HTTP ${HTTP_CODE})"
              BADGE="🔴"
              ANY_DOWN=true
              if [[ "$SEVERITY" == "critical" ]]; then
                MINISTRY_DOWN=true
                MINISTRY_STATUS="down"
              fi
            fi

            SEVERITY_LABEL="standard"
            [[ "$SEVERITY" == "critical" ]] && SEVERITY_LABEL="⚠️ CRITICAL (outreach)"

            SUMMARY_ROWS="${SUMMARY_ROWS}| ${BADGE} \`${DOMAIN}\` | ${STATUS} | ${SEVERITY_LABEL} |\n"
            echo "  ${BADGE} ${DOMAIN}: ${STATUS}"
          done

          # Content integrity — ministry domain must serve expected content
          CONTENT=$(curl -s --max-time 15 "https://voiceofjesusministry.org" 2>/dev/null || true)
          if echo "$CONTENT" | grep -qi "jesus\|ministry\|faith\|grace"; then
            INTEGRITY_ROW="| ✅ Content integrity | voiceofjesusministry.org serves expected content |"
          else
            INTEGRITY_ROW="| ⚠️ Content integrity | Could not verify expected content on voiceofjesusministry.org |"
            echo "::warning::Ministry content integrity check could not confirm expected keywords."
          fi

          # Write GitHub Step Summary
          {
            echo "## 🌐 Tri-Domain Health Report"
            echo "| Status | Domain | Severity |"
            echo "|--------|--------|----------|"
            printf "%b" "$SUMMARY_ROWS"
            echo ""
            echo "### Content Integrity"
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "$INTEGRITY_ROW"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "ministry_status=${MINISTRY_STATUS}" >> "$GITHUB_OUTPUT"
          echo "ministry_down=${MINISTRY_DOWN}"      >> "$GITHUB_OUTPUT"

          if [[ "$MINISTRY_DOWN" == "true" ]]; then
            echo "::error::🚨 CRITICAL — voiceofjesusministry.org is DOWN. Ministry outreach is disrupted."
            exit 1
          fi

  verify-signing:
    name: Verify Ministry Content Signing
    runs-on: ubuntu-latest
    needs: monitor
    # Run even if monitor fails so we always report signing status
    if: always()
    steps:
      - name: Verify ministry content signature
        shell: bash
        env:
          MINISTRY_GPG_PUBLIC_KEY: ${{ secrets.MINISTRY_GPG_PUBLIC_KEY }}
        run: |
          if [[ -z "$MINISTRY_GPG_PUBLIC_KEY" ]]; then
            echo "ℹ️  MINISTRY_GPG_PUBLIC_KEY secret not configured — skipping signature verification."
            echo "### 🔏 Content Signing" >> "$GITHUB_STEP_SUMMARY"
            echo "| Status | Note |"   >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|------|"   >> "$GITHUB_STEP_SUMMARY"
            echo "| ⏭️ Skipped | MINISTRY_GPG_PUBLIC_KEY secret not set |" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "$MINISTRY_GPG_PUBLIC_KEY" | gpg --import 2>/dev/null
          FINGERPRINT=$(gpg --list-keys --with-colons 2>/dev/null | awk -F: '/^fpr/{print $10; exit}')

          # Fetch the published signature manifest from the ministry domain
          MANIFEST_URL="https://voiceofjesusministry.org/content-manifest.txt"
          SIG_URL="https://voiceofjesusministry.org/content-manifest.txt.asc"

          curl -sf --max-time 15 "$MANIFEST_URL" -o /tmp/content-manifest.txt || {
            echo "::warning::Could not fetch content manifest from ministry domain."
            echo "### 🔏 Content Signing" >> "$GITHUB_STEP_SUMMARY"
            echo "| Status | Note |"   >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|------|"   >> "$GITHUB_STEP_SUMMARY"
            echo "| ⚠️ Unavailable | Could not fetch content manifest from ministry domain |" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          }
          curl -sf --max-time 15 "$SIG_URL" -o /tmp/content-manifest.txt.asc || {
            echo "::warning::Could not fetch content manifest signature from ministry domain."
            echo "### 🔏 Content Signing" >> "$GITHUB_STEP_SUMMARY"
            echo "| Status | Note |"   >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|------|"   >> "$GITHUB_STEP_SUMMARY"
            echo "| ⚠️ Unavailable | Could not fetch content manifest signature from ministry domain |" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          }

          if gpg --verify /tmp/content-manifest.txt.asc /tmp/content-manifest.txt 2>&1; then
            echo "✅ Ministry content manifest signature is valid (key: ${FINGERPRINT})"
            SIGN_RESULT="✅ Valid"
          else
            echo "::error::❌ Ministry content manifest signature INVALID — possible tampering detected!"
            SIGN_RESULT="❌ INVALID — possible tampering"
            echo "### 🔏 Content Signing"          >> "$GITHUB_STEP_SUMMARY"
            echo "| Status | Key Fingerprint |"     >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|----------------|"      >> "$GITHUB_STEP_SUMMARY"
            echo "| ${SIGN_RESULT} | \`${FINGERPRINT}\` |" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "### 🔏 Content Signing"          >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | Key Fingerprint |"     >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|----------------|"      >> "$GITHUB_STEP_SUMMARY"
          echo "| ${SIGN_RESULT} | \`${FINGERPRINT}\` |" >> "$GITHUB_STEP_SUMMARY"

  ai-incident-summary:
    name: AI Incident Summary
    runs-on: ubuntu-latest
    needs: monitor
    if: failure() && needs.monitor.outputs.ministry_down == 'true'
    steps:
      - name: Generate AI incident summary
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [[ -z "$GEMINI_API_KEY" ]]; then
            echo "ℹ️  GEMINI_API_KEY secret not configured — skipping AI incident summary."
            exit 0
          fi

          TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
          PROMPT="You are an operations assistant. Generate a concise incident summary (3–5 sentences) for the following outage: The ministry domain voiceofjesusministry.org was detected as DOWN during a scheduled health check at ${TIMESTAMP}. Include: root cause possibilities (DNS, server, SSL), estimated impact on ministry outreach, and recommended immediate actions. Keep the tone professional and constructive."

          PROMPT_JSON=$(python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" <<< "$PROMPT")
          REQUEST_BODY="{\"contents\":[{\"parts\":[{\"text\":${PROMPT_JSON}}]}]}"

          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY" \
            --max-time 30)

          SUMMARY=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          try:
              print(data['candidates'][0]['content']['parts'][0]['text'])
          except Exception:
              print('Could not parse AI response.')
          " 2>/dev/null || echo "AI summary unavailable.")

          echo "### 🤖 AI Incident Summary"     >> "$GITHUB_STEP_SUMMARY"
          echo ""                                >> "$GITHUB_STEP_SUMMARY"
          echo "$SUMMARY"                        >> "$GITHUB_STEP_SUMMARY"
          echo ""                                >> "$GITHUB_STEP_SUMMARY"
          echo "_Generated at ${TIMESTAMP}_"     >> "$GITHUB_STEP_SUMMARY"

          echo "--- AI INCIDENT SUMMARY ---"
          echo "$SUMMARY"
