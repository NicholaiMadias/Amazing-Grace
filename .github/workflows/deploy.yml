name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      comment:
        description: "Optional deployment note (shown in the job summary)"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Log deployment comment
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.comment != '' }}
        run: |
          echo "## 📝 Deployment Note" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ inputs.comment }}" >> $GITHUB_STEP_SUMMARY

      - name: Build
        run: npm run build

      - name: Copy CNAME to dist
        run: "[ -f CNAME ] && cp CNAME dist/CNAME || true"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
