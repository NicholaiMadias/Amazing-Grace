<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Certificates | Nexus Arcade — Amazing Grace</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap');
    :root {
      --neon-blue:   #00f2ff;
      --neon-purple: #bc13fe;
      --deep-space:  #020617;
      --surface:     #161b22;
      --text:        #e2e8f0;
      --muted:       #8b949e;
      --accent-gold: #fbbf24;
      --accent-green:#3fb950;
      --radius:      12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--deep-space);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem;
    }
    .orbitron { font-family: 'Orbitron', sans-serif; }

    /* Focus ring */
    *:focus-visible { outline: 3px solid var(--neon-blue); outline-offset: 2px; }

    /* Page header */
    .page-header {
      max-width: 860px; margin: 0 auto 2rem;
      display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    }
    .page-header h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 900; color: #fff; }
    .page-header p  { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--neon-blue); margin-top: 0.25rem; }
    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); text-decoration: none; white-space: nowrap; padding: 0.45rem 1rem;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .back-link:hover { color: var(--neon-blue); border-color: rgba(0,242,255,0.4); background: rgba(0,242,255,0.05); }

    /* Certificate cards */
    .cert-list { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }

    .cert-card {
      background: rgba(22,27,34,0.9); border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius); padding: 1.25rem 1.5rem;
      display: flex; align-items: center; gap: 1.25rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .cert-card:hover { border-color: rgba(0,242,255,0.3); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
    .cert-card:focus-visible { outline: 3px solid var(--neon-blue); outline-offset: 2px; border-color: rgba(0,242,255,0.4); }

    /* Icon badge */
    .cert-icon-wrap {
      width: 56px; height: 56px; flex-shrink: 0;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      background: rgba(251,191,36,0.10);
      border: 1px solid rgba(251,191,36,0.22);
    }

    .cert-meta { flex: 1; min-width: 0; }
    .cert-game {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem; font-weight: 700; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cert-player { font-size: 0.82rem; color: var(--muted); margin-top: 0.35rem; }
    .cert-player span { color: var(--neon-blue); font-weight: 600; }
    .cert-detail { font-size: 0.72rem; color: #475569; margin-top: 0.25rem; }
    .cert-id { font-size: 0.65rem; color: #334155; font-family: monospace; margin-top: 0.2rem; }

    /* Empty state */
    .empty-state {
      max-width: 860px; margin: 4rem auto; text-align: center;
    }
    .empty-icon-wrap {
      width: 80px; height: 80px; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      margin: 0 auto 1.25rem;
    }
    .empty-state h2 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--muted); margin-bottom: 0.5rem; }
    .empty-state p  { font-size: 0.8rem; color: #475569; margin-bottom: 1.5rem; }
    .play-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.5rem; min-height: 44px;
      border: 1px solid rgba(0,242,255,0.3);
      border-radius: var(--radius); color: var(--neon-blue); text-decoration: none;
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .play-btn:hover { background: rgba(0,242,255,0.08); border-color: var(--neon-blue); box-shadow: 0 0 14px rgba(0,242,255,0.15); }

    /* Count label */
    .count-label {
      max-width: 860px; margin: 0 auto 0.75rem;
      display: inline-flex; align-items: center;
      font-size: 0.65rem; color: #7effd8; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em;
      background: rgba(126,255,216,0.07); border: 1px solid rgba(126,255,216,0.2);
      padding: 0.2rem 0.75rem; border-radius: 999px;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .cert-card, .play-btn, .back-link { transition: none !important; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="page-header">
    <div>
      <h1>CERTIFICATES</h1>
      <p>Nexus Arcade — Completion Records</p>
    </div>
    <a class="back-link" href="/arcade/">← Back to Arcade</a>
  </div>

  <!-- Certificate list (populated by JS) -->
  <div id="count-label" class="count-label"></div>
  <div id="cert-list" class="cert-list"></div>

  <!-- Empty state (shown when no certificates) -->
  <div id="empty-state" class="empty-state" style="display:none;">
    <div class="empty-icon-wrap" aria-hidden="true">🎮</div>
    <h2>No Certificates Yet</h2>
    <p>Complete a game to earn your first certificate.</p>
    <a class="play-btn" href="/arcade/">▶ Play Match Maker</a>
  </div>

  <script>
    (function () {
      var certs = [];
      try {
        certs = JSON.parse(localStorage.getItem('arcade-certificates') || '[]');
      } catch (_) { /* storage unavailable */ }

      var list       = document.getElementById('cert-list');
      var emptyState = document.getElementById('empty-state');
      var countLabel = document.getElementById('count-label');

      if (!Array.isArray(certs) || certs.length === 0) {
        emptyState.style.display = '';
        return;
      }

      countLabel.textContent = certs.length + ' certificate' + (certs.length !== 1 ? 's' : '') + ' earned';

      // Show newest first
      certs.slice().reverse().forEach(function (cert) {
        var card = document.createElement('div');
        card.className = 'cert-card';
        card.innerHTML =
          '<div class="cert-icon-wrap" aria-hidden="true">🏆</div>' +
          '<div class="cert-meta">' +
            '<div class="cert-game">' + esc(cert.game || 'Unknown Game') + '</div>' +
            '<div class="cert-player">Player: <span>' + esc(cert.player || 'Player') + '</span></div>' +
            '<div class="cert-detail">Completed: ' + esc(cert.date || '—') +
              (cert.score != null ? ' &nbsp;·&nbsp; Score: ' + esc(String(cert.score)) : '') +
            '</div>' +
            '<div class="cert-id">ID: ' + esc(cert.id || '—') + '</div>' +
          '</div>';
        list.appendChild(card);
      });

      function esc(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }
    })();
  </script>
</body>
</html>
