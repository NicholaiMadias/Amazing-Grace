<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Arcade | Amazing Grace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap');
        :root { --neon-blue: #00f2ff; --neon-purple: #bc13fe; --deep-space: #020617; }
        body { font-family: 'Inter', sans-serif; background-color: var(--deep-space); color: #e2e8f0; margin: 0; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; -webkit-tap-highlight-color: transparent; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .nexus-bg { background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%); position: fixed; inset: 0; z-index: -1; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .grid-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; width: 100%; max-width: 500px; aspect-ratio: 1; margin: 0 auto; }
        .tile { position: relative; border-radius: 8px; cursor: pointer; transition: transform 0.2s, opacity 0.3s; background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.05); }
        .tile.selected { outline: 3px solid var(--neon-blue); transform: scale(1.1); z-index: 10; box-shadow: 0 0 20px var(--neon-blue); }
        .key-btn { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(0, 210, 255, 0.2); transition: all 0.2s; }
        .key-btn:active { background: var(--neon-blue); color: var(--deep-space); transform: scale(0.9); }
        .cmd-btn { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(0, 242, 255, 0.1); transition: all 0.3s; }
        .cmd-btn:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--neon-blue); transform: translateY(-2px); }
        .loader { width: 40px; height: 40px; border: 4px solid #00D2FF; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .star-map { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; width: 100%; max-width: 400px; }
        .star-item { background: rgba(15,23,42,0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.3s; }
        .star-item:hover:not(.locked) { border-color: #f59e0b; transform: translateY(-2px); }
        .star-item.locked { opacity: 0.35; cursor: not-allowed; }
        .star-item.completed { border-color: #f59e0b; box-shadow: 0 0 15px rgba(245,158,11,0.3); }
        .star-item.active { border-color: #00f2ff; animation: starPulse 2s infinite; }
        @keyframes starPulse { 0%,100% { box-shadow: 0 0 5px rgba(0,242,255,0.2); } 50% { box-shadow: 0 0 20px rgba(0,242,255,0.5); } }
